<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      // Otimização de Resolução: Força o navegador a processar uma imagem mais leve
      // Isso reduz drasticamente o lag de processamento em celulares intermediários
      window.MINDAR = {
        IMAGE: {
          defaultVideoConstraints: {
            width: {ideal: 640},
            height: {ideal: 480}
          }
        }
      };
    </script>

    <style>
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center;
      }
      #start-btn {
        padding: 20px 40px; font-size: 18px; color: white; background: #90b965;
        border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      p { margin-bottom: 20px; padding: 0 20px; line-height: 1.5; }
    </style>
  </head>

  <body>
    <div id="ui-overlay">
      <p>Prepare o livro e clique abaixo<br>para iniciar a experiência. (Teste 01) </p>
      <button id="start-btn">VER REALIDADE AUMENTADA</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: https://clasiq-web.github.io/projeto/targets0.mind; 
      filterMinCF: 0.00001; 
      filterBeta: 0.5; 
      missTolerance: 5; 
      warmupTolerance: 5; 
      maxTrack: 1;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="meuVideo" src="https://clasiq-web.github.io/projeto/video.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" smooth="true" rotation-smoothing="0.01" position-smoothing="0.01">
        <a-video src="#meuVideo" position="0 0 0" height="1.6" width="1" scale="1.05 1.05 1" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#meuVideo');
      const startBtn = document.querySelector('#start-btn');
      const overlay = document.querySelector('#ui-overlay');

      startBtn.addEventListener('click', () => {
        video.play();
        video.pause(); 
        overlay.style.display = 'none';
      });

      const scene = document.querySelector('a-scene');
      scene.addEventListener('targetFound', event => {
        video.play();
      });

      scene.addEventListener('targetLost', event => {
        video.pause();
      });
    </script>
  </body>
</html>
