<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: https://seu-usuario.github.io/ar-livro/targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="meuVideo" src="https://clasiq-web.github.io/projeto/video.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#meuVideo" position="0 0 0" height="1.6" width="1" rotation="0 0 0" scale="1.05 1.05 1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#meuVideo');
      const scene = document.querySelector('a-scene');
      scene.addEventListener('targetFound', event => { video.play(); });
      scene.addEventListener('targetLost', event => { video.pause(); });
    </script>
  </body>
</html>
